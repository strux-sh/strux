project_version: 0.1.0
name: ${projectName}

bsp: qemu

hostname: ${projectName}

# --- Display Configuration ---
display:
  monitors:
    - path: /
      resolution: 1920x1080
      names:
        - Virtual-1

# --- Multi-Monitor Example ---
# display:
#   monitors:
#     - path: /
#       resolution: 1920x1080
#       # Optional wlroots output transform: normal, 90, 180, 270, flipped, flipped-90, flipped-180, flipped-270
#       # transform: 90
#       names:
#         - HDMI-A-1
#         - Virtual-1
#       input_devices:
#         - ILITEK
#     - path: /dashboard
#       resolution: 1280x720
#       names:
#         - HDMI-A-2
#         - Virtual-2

boot:
  # --- The splash screen configuration ---
  splash:

    # --- Whether to enable the bootsplash ---
    enabled: true

    # --- The logo to use for the bootsplash (must be a png) ---
    logo: ./assets/logo.png

    # --- The color of the web browser background to ensure a smooth transition from the bootsplash to your app ---
    color: "000000"
  

update:
  enabled: false
  auto_bundle: false


# --- Global RootFS Configuration ---
rootfs:
  # --- The RootFS Overlay to use ---
  overlay: ./overlay

  # --- The RootFS Packages to install (can be a list of packages or locations to .deb files) ---
  packages:
    - curl
    - wget

# --- Project Build Scripts ---
# --- Run against the assembled rootfs during post-processing, before the image is bundled. ---
# --- Use these for project-specific image customization that doesn't belong in the BSP, ---
# --- e.g. installing a tool whose Debian package lags upstream. ---
# ---
# --- Each script runs with $ROOTFS_DIR (the extracted rootfs) plus these helpers: ---
# ---   run_in_chroot "cmd" / strux_chroot "cmd"      run a command inside the image ---
# ---   strux_install_file <src> <abs-dest> [mode]    copy a host file into the image ---
# ---   strux_progress "msg" / strux_progress_bar "msg" <pct>   drive the CLI progress display ---
# --- ...and the full build environment (TARGET_ARCH, PROJECT_NAME, STRUX_VERSION, etc.). ---
# --- The rootfs is repacked in place after a successful run, so scripts must be idempotent. ---
# scripts:
#   - location: ./scripts/install-yt-dlp.sh
#     # --- rootfs_post is the only step today (runs after post-processing, before bundling) ---
#     step: rootfs_post
#     description: "Install latest yt-dlp from GitHub releases"
#     # --- Omit cached_generated_artifacts to run every build (e.g. "always fetch latest"). ---
#     # --- Declare them (and optionally depends_on) to cache/skip the script when unchanged. ---
#     # depends_on:
#     #   - ./scripts/install-yt-dlp.sh

# --- QEMU Specific Configuration ---
qemu:

  # Whether o rnot to use QEMU for Local Testing
  enabled: true

  # --- The QEMU Network to use ---
  network: true

  # --- The QEMU USB Devices to use ---
  # usb:
  #   - vendor_id: "1234"
  #     product_id: "5678"

  # --- The QEMU Flags to use ---
  flags:
    - -m 2G


build:
  # --- Dockerfile Build Environment Packages to Install (Only supports repository packages at the moment)---
  host_packages:
    - curl
    - wget

dev:
  # --- The Dev Server Configuration ---
  server:

    # --- The Fallback Hosts to use ---
    fallback_hosts:
      # --- Replace these with your local network IP addresses or add additional hosts here as needed ---
      # --- This will launch and bind the dev server to these hosts and ports on the local network, and add them to the dev client config ---
      - host: 10.0.2.2
        port: 8000

    # --- Whether to use mDNS discovery ---
    use_mdns_on_client: true

    # --- The Dev Client Key to use ---
    client_key: ${clientKey}

  # --- WebKit Inspector Configuration ---
  # --- Enables remote debugging via HTTP - open in any browser ---
  inspector:

    # --- Whether to enable the WebKit Inspector ---
    enabled: true

    # --- The port for the inspector HTTP server ---
    port: 9223

  # --- USB Debug Ethernet ---
  usb:
    enabled: true
    subnet: 192.168.7.0/24
